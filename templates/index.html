<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoBot</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h2 class="logo">🌿 EcoBot</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#chatSection">Chat</a>
      <a href="/about">About</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Smarter Conversations. Greener Future.</h1>
      <p>Your AI assistant for eco-friendly living 🌍</p>
      <button onclick="scrollToChat()" class="hero-btn">Start Chatting</button>
    </div>
  </section>

  <!-- CHAT -->
  <section class="chat-section" id="chatSection">
    <div class="container">
      <h2 class="chat-title">EcoBot Chat</h2>

      <div id="chatBox" class="chat-box"></div>

      <form id="chatForm" class="input-area">
        <input id="inp" type="text" placeholder="Ask something..." required />
        <button class="btn">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 EcoBot • Built with 💚 for a sustainable future</p>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
